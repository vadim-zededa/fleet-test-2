apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-2
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-2
  template:
    metadata:
      labels:
        app: nginx-2
        special: fleet-test-2
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-2
  namespace: default
spec:
  selector:
    app: nginx-2
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
